name: Python Package

on:
  push:
    branches:
     - main
    tags:
      - '*'

  pull_request:
    branches:
      - main

jobs:
  generate-wheels-matrix:
    name: Generate wheels matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set-matrix.outputs.include }}
    steps:
      - uses: actions/checkout@v6
      - name: Install cibuildwheel
        run: pipx install cibuildwheel==3.4.0
      - id: set-matrix
        run: |
          MATRIX=$(
            {
              cibuildwheel --print-build-identifiers --platform linux \
              | jq -nRc '{"only": inputs, "os": "ubuntu-latest"}' \
              && cibuildwheel --print-build-identifiers --platform macos --archs x86_64 \
              | jq -nRc '{"only": inputs, "os": "macos-15-intel"}' \
              && cibuildwheel --print-build-identifiers --platform macos --archs arm64 \
              | jq -nRc '{"only": inputs, "os": "macos-latest"}' \
              && cibuildwheel --print-build-identifiers --platform windows \
              | jq -nRc '{"only": inputs, "os": "windows-latest"}'
            } | jq -sc
          )
          echo "include=$MATRIX" >> $GITHUB_OUTPUT          
    env:
      CIBW_BUILD: cp39-*
      CIBW_ARCHS_LINUX: x86_64
      CIBW_ARCHS_MACOS: arm64 x86_64
      CIBW_ARCHS_WINDOWS: AMD64
      CIBW_SKIP: pp* *musllinux* cp*t*

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Build sdist
        run: pipx run build --sdist

      - name: Store the packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-source
          path: dist

  build-wheels:
    name: Build ${{ matrix.only }}
    needs: generate-wheels-matrix
    strategy:
      matrix:
        include: ${{ fromJson(needs.generate-wheels-matrix.outputs.include) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: 'recursive'
  
      - uses: pypa/cibuildwheel@v3.4.0
        with:
          only: ${{ matrix.only }}
          output-dir: dist
        env:
          CIBW_TEST_EXTRAS: test
          CIBW_TEST_COMMAND: pytest {project}/tests
          
      - name: codecov
        uses: codecov/codecov-action@v5
  
      - name: Store the packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-${{ matrix.only }}
          path: dist

  test-wheels:
    name: Test ${{ matrix.platform.os }} / Python ${{ matrix.python-version }}
    needs: build-wheels
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            artifact: python-package-cp39-manylinux_x86_64
          - os: macos-latest
            artifact: python-package-cp39-macosx_arm64
          - os: macos-15-intel
            artifact: python-package-cp39-macosx_x86_64
          - os: windows-latest
            artifact: python-package-cp39-win_amd64
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
        
      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.platform.artifact }}
          path: dist/
        
      - name: Install package
        run: pip install dolphin-memory-engine --find-links dist/ --no-index

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/

  pypi:
    runs-on: 'ubuntu-latest'
    needs:
      - build-sdist
      - build-wheels
      - test-wheels

    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          pattern: python-package-*
          merge-multiple: true
          path: dist/

      - name: Publish 📦 to TestPyPI
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
      
      - name: Publish 📦 to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: pypa/gh-action-pypi-publish@release/v1
